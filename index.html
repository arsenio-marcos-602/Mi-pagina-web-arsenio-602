<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modo Oscuro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      transition: 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .contenedor {
      text-align: center;
    }

    /* Modo oscuro */
    body.dark {
      background: #121212;
      color: white;
    }

    /* Interruptor */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      margin-top: 20px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <h1>Modo Oscuro</h1>

    <label class="switch">
      <input type="checkbox" id="toggleDark">
      <span class="slider"></span>
    </label>
  </div>







  <script>
    const toggle = document.getElementById("toggleDark");

    toggle.addEventListener("change", () => {
      document.body.classList.toggle("dark");
    });
  </script>

</body>
</html>
