<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modo oscuro</title>

<style>
:root {
  --bg: white;
  --text: black;
}

/* Modo oscuro */
body.dark {
  --bg: #121212;
  --text: white;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  transition: 0.3s;
}

/* Interruptor */
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
}

.switch input {
  opacity: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  background: #ccc;
  border-radius: 24px;
  top: 0; left: 0; right: 0; bottom: 0;
}

.slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #4CAF50;
}

input:checked + .slider:before {
  transform: translateX(26px);
}
</style>
</head>

<body>

<h1>Modo oscuro con interruptor</h1>

<label class="switch">
  <input type="checkbox" id="toggle">
  <span class="slider"></span>
</label>

<script>
const toggle = document.getElementById('toggle');

// cambiar modo
toggle.addEventListener('change', () => {
  document.body.classList.toggle('dark');
});
</script>

</body>
</html>
